name: Telegram Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: 'Telegram links — space, comma, or newline separated (max 1000)'
        required: true
        type: string
      custom_filename:
        description: 'Custom output filename (single-file downloads only; original extension is kept)'
        required: false
        type: string
        default: ''
      max_part_mb:
        description: 'Max part size in MB for splitting (0 = no split)'
        required: false
        type: number
        default: 90

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get install -y p7zip-full python3 python3-pip
          pip3 install -q requests

      - name: Write downloader script
        run: |
          cat > /tmp/telegram_downloader.py << 'EOF'
          #!/usr/bin/env python3
          import os, sys, time, json, uuid, re, subprocess
          from pathlib import Path
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import requests

          def parse_links(raw_text):
              text = raw_text.replace(',', '\n').replace(' ', '\n')
              links = []
              for line in text.splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith('http'):
                      links.append(line)
                  elif 't.me/' in line:
                      links.append('https://' + line.lstrip('/'))
              seen, unique = set(), []
              for l in links:
                  if l not in seen:
                      seen.add(l)
                      unique.append(l)
              if len(unique) > 1000:
                  print(f"⚠️  More than 1000 links detected — processing first 1000 only.")
                  unique = unique[:1000]
              print(f"✅ {len(unique)} valid links found.")
              return unique

          def download_with_resume(url, dest, headers, max_retries=10, chunk_size=64*1024):
              dest = Path(dest)
              dest.parent.mkdir(parents=True, exist_ok=True)
              temp = dest.with_name(f".{uuid.uuid4().hex}.partial")
              downloaded = temp.stat().st_size if temp.exists() else 0
              sess = requests.Session()
              sess.headers.update(headers)
              for attempt in range(max_retries):
                  try:
                      range_hdr = {"Range": f"bytes={downloaded}-"} if downloaded > 0 else {}
                      resp = sess.get(url, stream=True, timeout=30, headers=range_hdr)
                      resp.raise_for_status()
                      total = int(resp.headers.get('content-length', 0)) + (downloaded if downloaded > 0 else 0)
                      mode = 'ab' if downloaded > 0 else 'wb'
                      with open(temp, mode) as f:
                          for chunk in resp.iter_content(chunk_size=chunk_size):
                              if chunk:
                                  f.write(chunk)
                                  downloaded += len(chunk)
                                  if total > 0:
                                      pct = downloaded / total * 100
                                      bar = '█' * int(40 * downloaded // total) + '░' * (40 - int(40 * downloaded // total))
                                      print(f"\r  [{bar}] {pct:.1f}%  ({downloaded}/{total} B)", end='', flush=True)
                      print()
                      temp.replace(dest)
                      return True, dest.stat().st_size
                  except (requests.exceptions.ChunkedEncodingError,
                          requests.exceptions.ConnectionError,
                          requests.exceptions.Timeout) as e:
                      print(f"\n⚠️  Connection error: {e}. Retry {attempt+1}/{max_retries}")
                      time.sleep(2 ** attempt)
                  except Exception as e:
                      print(f"\n❌ Fatal error: {e}")
                      if temp.exists():
                          temp.unlink()
                      return False, 0
              print("\n❌ Max retries reached.")
              if temp.exists():
                  temp.unlink()
              return False, 0

          def fetch_direct_link(telegram_link, headers):
              api = "https://telegramdownloader.net/proxy.php"
              try:
                  resp = requests.post(api, headers=headers, data={"telegram_link": telegram_link}, timeout=15)
                  resp.raise_for_status()
                  result = resp.json()
                  raw_url = result.get('data', {}).get('data', {}).get('link')
                  file_name = result.get('data', {}).get('data', {}).get('file_name')
                  if not raw_url or not file_name:
                      return None, None, "No direct link returned"
                  return raw_url, file_name, None
              except Exception as e:
                  return None, None, str(e)

          def sanitize_name(name):
              if not name.isascii():
                  rand = os.urandom(8).hex()
                  ext = Path(name).suffix or ".bin"
                  return f"{rand}{ext}"
              clean = re.sub(r'[^a-zA-Z0-9._-]', '_', name)
              return re.sub(r'__+', '_', clean)

          def process_link(link, base_dir, session_headers):
              print(f"\n🔗 Fetching info: {link}")
              url, fname, err = fetch_direct_link(link, session_headers)
              if err:
                  print(f"❌ Error: {err}")
                  return None, 0, err
              print(f"📁 Remote filename: {fname}")
              dest = base_dir / fname
              counter = 1
              while dest.exists():
                  dest = base_dir / f"{dest.stem}_{counter}{dest.suffix}"
                  counter += 1
              print(f"🚀 Downloading …")
              success, size = download_with_resume(url, dest, session_headers)
              if not success:
                  return None, 0, "Download failed"
              print(f"✅ Done: {dest.name} ({size/1e6:.2f} MB)")
              return dest, size, None

          def main():
              links_env = os.environ.get("TEL_LINKS", "").strip()
              if not links_env:
                  print("❌ No links provided.")
                  sys.exit(1)
              links = parse_links(links_env)
              if not links:
                  print("❌ No valid links found.")
                  sys.exit(1)

              custom_filename = os.environ.get("CUSTOM_FILENAME", "").strip()
              out_dir = Path(os.environ.get("OUT_DIR", "/tmp/telegram_dl"))
              out_dir.mkdir(parents=True, exist_ok=True)

              headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

              results = []
              with ThreadPoolExecutor(max_workers=2) as executor:
                  futures = {executor.submit(process_link, link, out_dir, headers): link for link in links}
                  for future in as_completed(futures):
                      link = futures[future]
                      try:
                          dest, size, err = future.result()
                          if not err:
                              results.append((dest, size))
                          else:
                              print(f"🔴 Failed: {link} ({err})")
                      except Exception as e:
                          print(f"🔴 Exception for {link}: {e}")

              if not results:
                  print("❌ No files downloaded successfully.")
                  sys.exit(1)

              # Apply custom filename for single-file runs
              if custom_filename and len(results) == 1:
                  dest, size = results[0]
                  ext = dest.suffix
                  new_name = custom_filename if Path(custom_filename).suffix else custom_filename + ext
                  new_dest = dest.with_name(new_name)
                  dest.rename(new_dest)
                  print(f"✏️  Renamed to: {new_name}")
                  results[0] = (new_dest, size)
              elif custom_filename and len(results) > 1:
                  print("⚠️  custom_filename ignored — only applies to single-file downloads.")

              # Sanitize filenames (non-ASCII → random hex)
              final = []
              for dest, size in results:
                  safe = sanitize_name(dest.name)
                  if safe != dest.name:
                      new_path = dest.with_name(safe)
                      dest.rename(new_path)
                      print(f"🌐 Renamed (non-ASCII): {dest.name} → {safe}")
                      final.append((new_path, size))
                  else:
                      final.append((dest, size))

              print(f"\n🎉 All done. {len(final)} file(s) ready in {out_dir}")
              for f, _ in final:
                  print(f"   {f}")

          if __name__ == "__main__":
              main()
          EOF

      - name: Download from Telegram
        run: |
          set -euo pipefail

          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          WORKDIR="/tmp/telegram_dl"
          OUTDIR="/tmp/telegram_out/$TIMESTAMP"
          mkdir -p "$WORKDIR" "$OUTDIR"

          TEL_LINKS="${{ github.event.inputs.telegram_links }}" \
          CUSTOM_FILENAME="${{ github.event.inputs.custom_filename }}" \
          OUT_DIR="$WORKDIR" \
          python3 /tmp/telegram_downloader.py

          # Split and copy to OUTDIR
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"
          SPLIT_LIMIT=$(( ${THRESH_MB:-90} * 1024 * 1024 ))

          split_or_copy() {
            local src="$1" dst_dir="$2" size base
            size=$(stat -c%s "$src")
            base=$(basename "$src")
            if [ "${THRESH_MB:-90}" -gt 0 ] && [ "$size" -gt "$SPLIT_LIMIT" ]; then
              echo "✂️  $base is $(( size / 1024 / 1024 )) MB — splitting into ${THRESH_MB}MB parts"
              7za a -v${THRESH_MB}m "$dst_dir/${base}.7z" "$src"
            else
              cp "$src" "$dst_dir/$base"
            fi
          }

          for F in "$WORKDIR"/*; do
            [ -f "$F" ] || continue
            split_or_copy "$F" "$OUTDIR"
          done

          (cd "$OUTDIR" && find . -maxdepth 1 -type f | sort | sed 's|^\./||' | xargs sha256sum > sha256sums.txt)

          FILE_COUNT=$(find "$OUTDIR" -type f ! -name sha256sums.txt | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️  No files downloaded."
            echo "has_files=false" >> $GITHUB_ENV
          else
            echo "✅ $FILE_COUNT file(s) ready:"
            ls -lh "$OUTDIR"
            echo "has_files=true" >> $GITHUB_ENV
          fi

          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "OUTDIR=$OUTDIR"       >> $GITHUB_ENV

      - name: Push to timestamped branch(es)
        if: env.has_files == 'true'
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"

          FILES_PER_BRANCH=15
          REPO="${{ github.repository }}"
          ORIG_BRANCH="${{ github.ref_name }}"

          mapfile -t ALL_FILES < <(find "$OUTDIR" -maxdepth 1 -type f \
            ! -name sha256sums.txt ! -name README.md | sort)
          TOTAL_FILES=${#ALL_FILES[@]}
          TOTAL_BRANCHES=$(( (TOTAL_FILES + FILES_PER_BRANCH - 1) / FILES_PER_BRANCH ))
          [ "$TOTAL_BRANCHES" -eq 0 ] && TOTAL_BRANCHES=1
          echo "📊 $TOTAL_FILES file(s) → $TOTAL_BRANCHES branch(es)"

          for PART in $(seq 1 "$TOTAL_BRANCHES"); do
            START=$(( (PART - 1) * FILES_PER_BRANCH ))
            CHUNK_FILES=("${ALL_FILES[@]:$START:$FILES_PER_BRANCH}")

            if [ "$TOTAL_BRANCHES" -eq 1 ]; then
              DL_BRANCH="dl/$TIMESTAMP"
            else
              DL_BRANCH="dl/${TIMESTAMP}-part${PART}of${TOTAL_BRANCHES}"
            fi
            BASE_URL="https://raw.githubusercontent.com/${REPO}/${DL_BRANCH}"

            CHUNK_DIR="/tmp/chunk_${PART}"
            mkdir -p "$CHUNK_DIR"
            for f in "${CHUNK_FILES[@]}"; do cp "$f" "$CHUNK_DIR/"; done

            (cd "$CHUNK_DIR" && find . -maxdepth 1 -type f ! -name sha256sums.txt \
              | sort | sed 's|^\./||' | xargs sha256sum > sha256sums.txt)

            {
              echo "## 📨 Telegram Download — \`$TIMESTAMP\`"
              if [ "$TOTAL_BRANCHES" -gt 1 ]; then echo ""; echo "**Part $PART of $TOTAL_BRANCHES**"; fi
              echo ""
              echo "Branch: \`${DL_BRANCH}\`"
              echo ""
              for f in "${CHUNK_FILES[@]}"; do
                fname=$(basename "$f")
                echo "- [${fname}](${BASE_URL}/${fname})"
              done
              echo ""
              echo "### Links"
              echo "\`\`\`"
              for f in "${CHUNK_FILES[@]}"; do echo "${BASE_URL}/$(basename "$f")"; done
              echo "\`\`\`"
              echo ""
              echo "**Checksums:** \`${BASE_URL}/sha256sums.txt\`"
            } > "$CHUNK_DIR/README.md"

            git checkout --orphan "$DL_BRANCH"
            git rm -rf . --quiet 2>/dev/null || true
            git clean -fd --quiet 2>/dev/null || true
            cp -r "$CHUNK_DIR/." .

            {
              echo "source_branch: $ORIG_BRANCH"
              echo "trigger_workflow: telegram"
              echo "links: |"
              printf '%s\n' "${{ github.event.inputs.telegram_links }}" | sed 's/^/  /'
              [ "$TOTAL_BRANCHES" -gt 1 ] && echo "part: $PART of $TOTAL_BRANCHES" || true
              echo "files:"
              find . -maxdepth 1 -type f \
                ! -name manifest.yml ! -name sha256sums.txt ! -name README.md \
                | sort | sed 's|^\./||;s/^/  - /'
            } > manifest.yml

            git add .
            git commit -m "📨 Telegram $TIMESTAMP$([ "$TOTAL_BRANCHES" -gt 1 ] && echo " part $PART/$TOTAL_BRANCHES") [skip ci]"
            git push origin "$DL_BRANCH"
            echo "✅ Part $PART/$TOTAL_BRANCHES → $DL_BRANCH"

            [ "$PART" -lt "$TOTAL_BRANCHES" ] && git checkout "$ORIG_BRANCH" || true
          done

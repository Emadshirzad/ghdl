name: Google Play Downloader

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name (e.g., com.google.android.youtube)'
        required: true
        type: string
      architecture:
        description: 'Target architecture'
        required: true
        type: choice
        default: 'arm64'
        options:
          - arm64
          - armv7
      merge_splits:
        description: 'Merge split APKs into a single installable APK'
        required: false
        type: boolean
        default: true
      max_part_mb:
        description: 'Max part size in MB for splitting (0 = no split)'
        required: false
        type: number
        default: 90

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-17-jre-headless apksigner python3 python3-venv python3-pip curl git p7zip-full

      - name: Clone gplay-apk-downloader
        run: |
          git clone https://github.com/alltechdev/gplay-apk-downloader.git /tmp/gplay
          cd /tmp/gplay && ./setup.sh

      - name: Authenticate with Google Play
        run: |
          cd /tmp/gplay
          printf '%s\n%s\ny\n' "$GOOGLE_EMAIL" "$GOOGLE_PASSWORD" | ./gplay auth
        env:
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}

      - name: Download APK
        run: |
          set -euo pipefail

          PACKAGE="${{ github.event.inputs.package_name }}"
          ARCH="${{ github.event.inputs.architecture }}"
          MERGE="${{ github.event.inputs.merge_splits }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"

          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          OUTDIR="/tmp/gplay_out/$TIMESTAMP"
          WORKDIR="/tmp/gplay_work"
          mkdir -p "$OUTDIR" "$WORKDIR"

          SPLIT_LIMIT=$(( ${THRESH_MB:-90} * 1024 * 1024 ))

          split_or_copy() {
            local src="$1" dst_dir="$2" size base
            size=$(stat -c%s "$src")
            base=$(basename "$src")
            if [ "${THRESH_MB:-90}" -gt 0 ] && [ "$size" -gt "$SPLIT_LIMIT" ]; then
              echo "✂️  $base is $(( size / 1024 / 1024 )) MB — splitting into ${THRESH_MB}MB parts"
              7za a -v${THRESH_MB}m "$dst_dir/${base}.7z" "$src"
              # Rename single-chunk archive to plain .7z
              if [ -f "$dst_dir/${base}.7z.001" ] && [ ! -f "$dst_dir/${base}.7z.002" ]; then
                mv "$dst_dir/${base}.7z.001" "$dst_dir/${base}.7z"
              fi
            else
              cp "$src" "$dst_dir/$base"
            fi
          }

          cd /tmp/gplay
          CMD="./gplay download ${PACKAGE} -a ${ARCH} -o ${WORKDIR}"
          [ "$MERGE" = "true" ] && CMD="$CMD -m"
          echo "Running: $CMD"
          $CMD

          for F in "$WORKDIR"/*.apk "$WORKDIR"/*.zip; do
            [ -f "$F" ] || continue
            split_or_copy "$F" "$OUTDIR"
          done

          (cd "$OUTDIR" && find . -maxdepth 1 -type f | sort | sed 's|^\./||' | xargs sha256sum > sha256sums.txt)

          FILE_COUNT=$(find "$OUTDIR" -type f ! -name sha256sums.txt | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️  No files downloaded."
            echo "has_files=false" >> $GITHUB_ENV
          else
            echo "✅ Downloaded $FILE_COUNT file(s):"
            ls -lh "$OUTDIR"
            echo "has_files=true" >> $GITHUB_ENV
          fi

          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "OUTDIR=$OUTDIR"       >> $GITHUB_ENV

      - name: Push to timestamped branch(es)
        if: env.has_files == 'true'
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"

          FILES_PER_BRANCH=15
          REPO="${{ github.repository }}"
          ORIG_BRANCH="${{ github.ref_name }}"

          mapfile -t ALL_FILES < <(find "$OUTDIR" -maxdepth 1 -type f \
            ! -name sha256sums.txt ! -name README.md | sort)
          TOTAL_FILES=${#ALL_FILES[@]}
          TOTAL_BRANCHES=$(( (TOTAL_FILES + FILES_PER_BRANCH - 1) / FILES_PER_BRANCH ))
          [ "$TOTAL_BRANCHES" -eq 0 ] && TOTAL_BRANCHES=1
          echo "📊 $TOTAL_FILES file(s) → $TOTAL_BRANCHES branch(es)"

          for PART in $(seq 1 "$TOTAL_BRANCHES"); do
            START=$(( (PART - 1) * FILES_PER_BRANCH ))
            CHUNK_FILES=("${ALL_FILES[@]:$START:$FILES_PER_BRANCH}")

            if [ "$TOTAL_BRANCHES" -eq 1 ]; then
              DL_BRANCH="dl/$TIMESTAMP"
            else
              DL_BRANCH="dl/${TIMESTAMP}-part${PART}of${TOTAL_BRANCHES}"
            fi
            BASE_URL="https://raw.githubusercontent.com/${REPO}/${DL_BRANCH}"

            CHUNK_DIR="/tmp/chunk_${PART}"
            mkdir -p "$CHUNK_DIR"
            for f in "${CHUNK_FILES[@]}"; do cp "$f" "$CHUNK_DIR/"; done

            (cd "$CHUNK_DIR" && find . -maxdepth 1 -type f ! -name sha256sums.txt \
              | sort | sed 's|^\./||' | xargs sha256sum > sha256sums.txt)

            {
              echo "## 📦 Google Play — \`${{ github.event.inputs.package_name }}\` (\`${{ github.event.inputs.architecture }}\`)"
              if [ "$TOTAL_BRANCHES" -gt 1 ]; then echo ""; echo "**Part $PART of $TOTAL_BRANCHES**"; fi
              echo ""
              echo "Branch: \`${DL_BRANCH}\`"
              echo ""
              for f in "${CHUNK_FILES[@]}"; do
                fname=$(basename "$f")
                echo "- [${fname}](${BASE_URL}/${fname})"
              done
              echo ""
              echo "### Links"
              echo "\`\`\`"
              for f in "${CHUNK_FILES[@]}"; do echo "${BASE_URL}/$(basename "$f")"; done
              echo "\`\`\`"
              echo ""
              echo "**Checksums:** \`${BASE_URL}/sha256sums.txt\`"
            } > "$CHUNK_DIR/README.md"

            git checkout --orphan "$DL_BRANCH"
            git rm -rf . --quiet 2>/dev/null || true
            git clean -fd --quiet 2>/dev/null || true
            cp -r "$CHUNK_DIR/." .

            {
              echo "source_branch: $ORIG_BRANCH"
              echo "trigger_workflow: google-play"
              echo "package_name: ${{ github.event.inputs.package_name }}"
              echo "architecture: ${{ github.event.inputs.architecture }}"
              echo "merge_splits: ${{ github.event.inputs.merge_splits }}"
              [ "$TOTAL_BRANCHES" -gt 1 ] && echo "part: $PART of $TOTAL_BRANCHES" || true
              echo "files:"
              find . -maxdepth 1 -type f \
                ! -name manifest.yml ! -name sha256sums.txt ! -name README.md \
                | sort | sed 's|^\./||;s/^/  - /'
            } > manifest.yml

            git add .
            git commit -m "📦 Google Play ${{ github.event.inputs.package_name }} $TIMESTAMP$([ "$TOTAL_BRANCHES" -gt 1 ] && echo " part $PART/$TOTAL_BRANCHES") [skip ci]"
            git push origin "$DL_BRANCH"
            echo "✅ Part $PART/$TOTAL_BRANCHES → $DL_BRANCH"

            [ "$PART" -lt "$TOTAL_BRANCHES" ] && git checkout "$ORIG_BRANCH" || true
          done

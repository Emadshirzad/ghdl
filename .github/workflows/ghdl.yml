name: ghdl

# Trigger options:
#   1. Push a commit whose message contains http(s):// URLs
#   2. Actions → ghdl → Run workflow → paste URLs into the "urls" field
# Examples:
#   git commit -am "https://example.com/file.zip"
#   git commit -am "https://youtu.be/dQw4w9WgXcQ"
#   git commit -am "https://mega.nz/file/XXXXXXXX#YYYYYYYY"
# For Docker images use the "Docker Image Downloader" workflow.
# For AUR packages use the "AUR Package Builder" workflow.
# For YouTube use the "YouTube Downloader" workflow.

on:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated https:// URLs to download'
        required: true
        type: string

jobs:
  download:
    # Skip commits we generated ourselves; always run on workflow_dispatch
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout with full history so we can push to other branches ──────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Detect whether this trigger contains any download targets ─────────
      - name: Detect targets
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MSG="${{ github.event.inputs.urls }}"
          else
            MSG=$(git log -1 --pretty=%B)
          fi
          if echo "$MSG" | grep -qP 'https?://'; then
            echo "has_targets=true"  >> $GITHUB_OUTPUT
          else
            echo "has_targets=false" >> $GITHUB_OUTPUT
          fi
          if echo "$MSG" | grep -qiP '(youtube\.com|youtu\.be|vimeo\.com|dailymotion\.com|twitch\.tv|tiktok\.com|instagram\.com|facebook\.com|fb\.watch|twitter\.com|x\.com|reddit\.com|bilibili\.com|vk\.com|vkvideo\.ru|rutube\.ru|streamable\.com|odysee\.com|rumble\.com|kick\.com|ok\.ru|weibo\.com|douyin\.com|afreecatv\.com|\.(mp4|mkv|webm|flv|avi|mov|m3u8)(\?|\s|$))'; then
            echo "has_media=true"  >> $GITHUB_OUTPUT
          else
            echo "has_media=false" >> $GITHUB_OUTPUT
          fi
          if echo "$MSG" | grep -qiP 'mega\.nz/(file|folder|#!)'; then
            echo "has_mega=true"  >> $GITHUB_OUTPUT
          else
            echo "has_mega=false" >> $GITHUB_OUTPUT
          fi
          echo "YT_PO_FLAG=" >> $GITHUB_ENV
          echo "URLs: $MSG"

      # ── 3. Install tools ─────────────────────────────────────────────────────
      - name: Install tools
        if: steps.detect.outputs.has_targets == 'true'
        run: |
          sudo apt-get install -y aria2 p7zip-full
          pip install -q yt-dlp

      - name: Install megatools
        if: steps.detect.outputs.has_targets == 'true' && steps.detect.outputs.has_mega == 'true'
        run: |
          sudo apt-get install -y megatools

      - name: Generate YouTube PO token via Deno
        if: steps.detect.outputs.has_targets == 'true' && steps.detect.outputs.has_media == 'true'
        run: |
          # Solves YouTube's BotGuard JS challenge automatically — no cookies or secrets needed.
          # Uses: https://github.com/YunzheZJU/youtube-po-token-generator
          curl -fsSL https://deno.land/install.sh | sh -s -- --no-modify-path
          export PATH="$HOME/.deno/bin:$PATH"

          PO_JSON=$(deno run -A npm:youtube-po-token-generator 2>/dev/null || echo "{}")
          VISITOR_DATA=$(echo "$PO_JSON" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('visitorData',''))" 2>/dev/null || true)
          PO_TOKEN=$(echo "$PO_JSON" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('poToken',''))" 2>/dev/null || true)

          if [ -n "$VISITOR_DATA" ] && [ -n "$PO_TOKEN" ]; then
            echo "YT_PO_FLAG=--extractor-args youtube:visitor_data=${VISITOR_DATA};po_token=web+${PO_TOKEN}" >> $GITHUB_ENV
            echo "✅ PO token generated"
          else
            echo "YT_PO_FLAG=" >> $GITHUB_ENV
            echo "⚠️  PO token generation failed — yt-dlp will try without it"
          fi

      # ── 4. Download everything ───────────────────────────────────────────────
      - name: Download
        if: steps.detect.outputs.has_targets == 'true'
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MSG="${{ github.event.inputs.urls }}"
          else
            MSG=$(git log -1 --pretty=%B)
          fi

          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          OUTDIR="/tmp/ghdl/$TIMESTAMP"
          WORKDIR="/tmp/ghdl_work"
          mkdir -p "$OUTDIR" "$WORKDIR"

          # Files larger than 90 MB are split so GitHub accepts them.
          # Split parts use 7-Zip's multi-volume format (reassemble with: 7za x file.7z.001)
          SPLIT_LIMIT=$((90 * 1024 * 1024))

          split_or_copy() {
            local src="$1"
            local dst_dir="$2"
            local size base
            size=$(stat -c%s "$src")
            base=$(basename "$src")
            if [ "$size" -gt "$SPLIT_LIMIT" ]; then
              echo "✂️  $base is $(( size / 1024 / 1024 )) MB — splitting into 90 MB parts"
              7za a -v90m "$dst_dir/${base}.7z" "$src"
              echo "   Parts: $(ls "$dst_dir/${base}.7z"* 2>/dev/null | wc -l)"
            else
              cp "$src" "$dst_dir/$base"
            fi
          }

          # Returns 0 if the URL looks like a media/video URL handled by yt-dlp
          is_media_url() {
            echo "$1" | grep -qiP '(youtube\.com|youtu\.be|vimeo\.com|dailymotion\.com|twitch\.tv|tiktok\.com|instagram\.com|facebook\.com|fb\.watch|twitter\.com|x\.com|reddit\.com|bilibili\.com|vk\.com|vkvideo\.ru|rutube\.ru|streamable\.com|odysee\.com|rumble\.com|kick\.com|ok\.ru|weibo\.com|douyin\.com|afreecatv\.com|\.(mp4|mkv|webm|flv|avi|mov|m3u8)(\?|$))'
          }

          # Returns 0 if the URL is a mega.nz file or folder link
          is_mega_url() {
            echo "$1" | grep -qiP 'mega\.nz/(file|folder|#!)'
          }

          # ── HTTP/HTTPS URLs ──────────────────────────────────────────────────
          while IFS= read -r RAW_URL; do
            # Strip trailing punctuation that might come from prose
            URL=$(echo "$RAW_URL" | sed 's/[.,;:!?)]+$//')
            [ -z "$URL" ] && continue
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            if is_mega_url "$URL"; then
              # ── mega.nz via megadl ───────────────────────────────────────────
              echo "☁️  megadl: $URL"
              MEGADIR="$WORKDIR/mega"
              mkdir -p "$MEGADIR"
              MEGA_OK=false
              for _attempt in 1 2 3; do
                if megadl --path "$MEGADIR" "$URL"; then
                  MEGA_OK=true; break
                fi
                echo "⏳  megadl attempt $_attempt failed — retrying in 30s"
                sleep 30
              done
              if [ "$MEGA_OK" != "true" ]; then
                echo "⚠️  megadl failed for $URL — skipping"; continue
              fi

              find "$MEGADIR" -type f | sort | while IFS= read -r F; do
                split_or_copy "$F" "$OUTDIR"
                rm -f "$F"
              done
              rm -rf "$MEGADIR"

            elif is_media_url "$URL"; then
              # ── Media / video via yt-dlp ─────────────────────────────────────
              echo "🎬 yt-dlp: $URL"
              YTDIR="$WORKDIR/yt"
              mkdir -p "$YTDIR"
              yt-dlp \
                -f "bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best[height<=480]" \
                --merge-output-format mp4 \
                --no-playlist \
                $YT_PO_FLAG \
                -o "$YTDIR/%(title)s.%(ext)s" \
                "$URL" || { echo "⚠️  yt-dlp failed for $URL — skipping"; continue; }

              for F in "$YTDIR"/*; do
                [ -f "$F" ] || continue
                split_or_copy "$F" "$OUTDIR"
                rm -f "$F"
              done
            else
              # ── Generic file via aria2c ──────────────────────────────────────
              echo "⬇️  aria2c: $URL"
              DLDIR="$WORKDIR/dl"
              mkdir -p "$DLDIR"
              aria2c \
                --split=16 \
                --max-connection-per-server=16 \
                --min-split-size=5M \
                --console-log-level=notice \
                --summary-interval=0 \
                -d "$DLDIR" \
                "$URL" || { echo "⚠️  aria2c failed for $URL — skipping"; continue; }

              for F in "$DLDIR"/*; do
                [ -f "$F" ] || continue
                split_or_copy "$F" "$OUTDIR"
                rm -f "$F"
              done
              rm -rf "$DLDIR"
            fi
          done < <(echo "$MSG" | grep -oP 'https?://\S+' || true)

          # ── Generate SHA-256 checksums ───────────────────────────────────────
          (cd "$OUTDIR" && find . -maxdepth 1 -type f | sort | sed 's|^\./||' | xargs sha256sum > sha256sums.txt)

          # ── Verify we produced something ─────────────────────────────────────
          FILE_COUNT=$(find "$OUTDIR" -type f ! -name sha256sums.txt | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️  No files were downloaded — nothing to commit."
            echo "has_files=false" >> $GITHUB_ENV
          else
            echo "✅ Downloaded $FILE_COUNT file(s):"
            ls -lh "$OUTDIR"
            echo "has_files=true"    >> $GITHUB_ENV
          fi

          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "OUTDIR=$OUTDIR"       >> $GITHUB_ENV

      # ── 5. Push downloaded files to a dedicated timestamped branch ─────────
      #    Each run → its own orphan branch: dl/YYYY-MM-DD_HH-MM-SS
      #    Pull a specific download with:
      #      git pull https://github.com/USER/REPO dl/YYYY-MM-DD_HH-MM-SS
      # ── 5. Push downloaded files to a dedicated timestamped branch ─────────
      - name: Push to timestamped branch(es)
        if: steps.detect.outputs.has_targets == 'true' && env.has_files == 'true'
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"

          FILES_PER_BRANCH=15
          REPO="${{ github.repository }}"
          ORIG_BRANCH="${{ github.ref_name }}"

          mapfile -t ALL_FILES < <(find "$OUTDIR" -maxdepth 1 -type f \
            ! -name sha256sums.txt ! -name README.md | sort)
          TOTAL_FILES=${#ALL_FILES[@]}
          TOTAL_BRANCHES=$(( (TOTAL_FILES + FILES_PER_BRANCH - 1) / FILES_PER_BRANCH ))
          [ "$TOTAL_BRANCHES" -eq 0 ] && TOTAL_BRANCHES=1
          echo "📊 $TOTAL_FILES file(s) → $TOTAL_BRANCHES branch(es)"

          for PART in $(seq 1 "$TOTAL_BRANCHES"); do
            START=$(( (PART - 1) * FILES_PER_BRANCH ))
            CHUNK_FILES=("${ALL_FILES[@]:$START:$FILES_PER_BRANCH}")

            if [ "$TOTAL_BRANCHES" -eq 1 ]; then
              DL_BRANCH="dl/$TIMESTAMP"
            else
              DL_BRANCH="dl/${TIMESTAMP}-part${PART}of${TOTAL_BRANCHES}"
            fi
            BASE_URL="https://raw.githubusercontent.com/${REPO}/${DL_BRANCH}"

            CHUNK_DIR="/tmp/chunk_${PART}"
            mkdir -p "$CHUNK_DIR"
            for f in "${CHUNK_FILES[@]}"; do cp "$f" "$CHUNK_DIR/"; done

            (cd "$CHUNK_DIR" && find . -maxdepth 1 -type f ! -name sha256sums.txt \
              | sort | sed 's|^\./||' | xargs sha256sum > sha256sums.txt)

            {
              echo "## 📦 Download links — \`$TIMESTAMP\`"
              [ "$TOTAL_BRANCHES" -gt 1 ] && echo "" && echo "**Part $PART of $TOTAL_BRANCHES**"
              echo ""
              echo "Branch: \`${DL_BRANCH}\`"
              if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                echo "URLs: \`${{ github.event.inputs.urls }}\`"
              else
                echo "Triggered by commit: \`${{ github.sha }}\`"
              fi
              echo ""
              for f in "${CHUNK_FILES[@]}"; do
                fname=$(basename "$f")
                echo "- [${fname}](${BASE_URL}/${fname})"
              done
              echo ""
              echo "### Links"
              echo "\`\`\`"
              for f in "${CHUNK_FILES[@]}"; do
                echo "${BASE_URL}/$(basename "$f")"
              done
              echo "\`\`\`"
              echo ""
              echo "**Checksums:** \`${BASE_URL}/sha256sums.txt\`"
            } > "$CHUNK_DIR/README.md"

            git checkout --orphan "$DL_BRANCH"
            git rm -rf . --quiet 2>/dev/null || true
            git clean -fd --quiet 2>/dev/null || true
            cp -r "$CHUNK_DIR/." .

            {
              echo "source_branch: $ORIG_BRANCH"
              if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                echo "trigger: workflow_dispatch"
                echo "urls: ${{ github.event.inputs.urls }}"
              else
                echo "trigger_commit: ${{ github.sha }}"
                echo "commit_message: |"
                git log -1 --pretty=%B "${{ github.sha }}" | sed 's/^/  /'
              fi
              [ "$TOTAL_BRANCHES" -gt 1 ] && echo "part: $PART of $TOTAL_BRANCHES"
              echo "files:"
              find . -maxdepth 1 -type f \
                ! -name manifest.yml ! -name sha256sums.txt ! -name README.md \
                | sort | sed 's|^\./||;s/^/  - /'
            } > manifest.yml

            git add .
            git commit -m "📦 $TIMESTAMP$([ "$TOTAL_BRANCHES" -gt 1 ] && echo " part $PART/$TOTAL_BRANCHES") — $ORIG_BRANCH [skip ci]"
            git push origin "$DL_BRANCH"
            echo "✅ Part $PART/$TOTAL_BRANCHES → $DL_BRANCH"

            [ "$PART" -lt "$TOTAL_BRANCHES" ] && git checkout "$ORIG_BRANCH"
          done
